name: Release

on:
  push:
    branches: [main]

# Only one release run at a time per branch.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create tags, commits, and GitHub Releases
      pull-requests: write  # open / update the "Version Packages" PR
      id-token: write       # for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required so changesets can compare against base.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # When changesets exist on main: opens / updates a "Version Packages" PR
      # that bumps package.json versions and writes CHANGELOG entries.
      # When no changesets exist (i.e. that PR has just merged): runs `publish`,
      # which runs `pnpm release` -> `changeset publish` -> npm publish + tag.
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
