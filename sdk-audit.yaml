inconsistencies_and_surprises: >
  - Envelope stamps sdk.contract_version="3.1.0" and session.is_first_session /
    session.total_sessions on every event — none are in the CLAUDE.md wire contract.
  - deferFlush config option is real (gates pipeline readiness) but undocumented in CLAUDE.md's public API list.
  - Mixed attribute-key style: frame_render_time and memory_usage metrics use DOTLESS
    keys (unit, frame_build_duration, memory_type, memory_source) while every other
    metric uses dotted metric.* keys. Native frame/memory samples omit metric.screen; web frames include it.
  - memory_type differs by platform for the SAME metric name: web "heap" / iOS "rss" / Android "pss";
    memory_source web "javascript" vs native "native". Backend must not assume one value.
  - Native crash JSON key is dotted "anr.duration_ms" (CrashRecordStorage.toJson) while the
    Kotlin internal ANR field is "anr_duration_ms" — dotted only appears on the wire.
  - http.success is true for 3xx (isSuccess = status 200-399), which may surprise dashboards expecting 2xx-only.
  - retry "backoff" is a fixed delay array, not computed exponential — labelled as exponential in CLAUDE.md.
  - device.id / device.* are produced by the capacitor DeviceContext bootstrap only; a pure-web
    consumer using core alone emits events with NO device.id (backfill cannot invent one), which
    the backend "drops events missing identity attrs" rule would reject.
  - resource_timing metric.resource_name is NOT run through url-sanitizer, unlike http.url.
  - EdgeRum.captureError sets is_fatal:false/handled:true; Angular RouterCapture NavigationError sets handled:false — two different "handled" semantics for navigation-adjacent errors.
  - No XHR instrumentation — only fetch is patched; apps using XMLHttpRequest/axios-on-XHR won't get http.request.
  - Root package.json version is 0.0.0 (private monorepo); real versions live per-package (all 3.5.0). Stray *.tgz packed tarballs (1.1.1) present in packages/*, unrelated to current version.
  - repo/vendor name is "nathanclaire" (@nathanclaire/rum), while CLAUDE.md/product name is "edge-rum"/"EdgeRUM".

ci_cd:
  what_exists: >
    .github/workflows/ci.yml (push/PR to main): pnpm install --frozen-lockfile, lint,
    build, type-check, unit tests (vitest), terminology-check, attribute-flatness-check,
    size (size-limit), pack-audit, then Playwright chromium install + integration tests
    (test:integration) gated on playwright.config.ts existing.
    .github/workflows/release.yml (on v*.*.* tag): install, build, verify tag is on main
    (git merge-base ancestor check), then `pnpm release` to publish.
  publishes_to: npm (registry.npmjs.org) via pnpm release, tag-driven (push v*.*.* tag), npm provenance (id-token). No changesets bot / Version Packages PR — versions bumped manually in the release commit.

open_questions:
  - Does the backend accept dotless frame/memory metric attribute keys, or expect metric.* everywhere?
  - Is a core-only web install (no capacitor) supported given events would lack device.id identity attrs?
  - Backend handling of sdk.contract_version / session.total_sessions — consumed, ignored, or unexpected?
  - Are 3xx-as-success http.request rows intended for backend error-rate calculations?
